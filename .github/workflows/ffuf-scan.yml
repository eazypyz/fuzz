name: FFUF Fuzzing Scan

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target URL tunggal (opsional, override configs/targets.yml). Contoh: https://example.com"
        required: false

permissions:
  contents: read

jobs:
  load-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-targets.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Set target list
        id: set-targets
        run: |
          set -euo pipefail

          INPUT_TARGET="${{ github.event.inputs.target }}"

          if [ -n "$INPUT_TARGET" ]; then
            TARGETS_JSON=$(printf '["%s"]' "$INPUT_TARGET")
          else
            if [ ! -f configs/targets.yml ]; then
              echo "::error::configs/targets.yml tidak ditemukan"
              exit 1
            fi
            # -I=0 memaksa output satu baris (compact), wajib untuk GITHUB_OUTPUT
            TARGETS_JSON=$(yq -o=json -I=0 '[.targets[].url]' configs/targets.yml)
          fi

          # Guard: pastikan hasil valid JSON array dan tidak kosong,
          # supaya fromJson() di job berikutnya tidak pernah menerima string kosong.
          if [ -z "$TARGETS_JSON" ] || [ "$TARGETS_JSON" = "[]" ] || [ "$TARGETS_JSON" = "null" ]; then
            echo "::error::Daftar target kosong. Cek isi configs/targets.yml"
            exit 1
          fi

          echo "Resolved targets: $TARGETS_JSON"
          echo "targets=$TARGETS_JSON" >> "$GITHUB_OUTPUT"

  fuzz:
    needs: load-targets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.load-targets.outputs.targets) }}
      fail-fast: false
      max-parallel: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install ffuf
        run: |
          go install github.com/ffuf/ffuf/v2@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Sanitize target name for filenames
        id: safe-name
        run: |
          SAFE=$(echo "${{ matrix.target }}" | sed -E 's~https?://~~; s~[^a-zA-Z0-9.-]~_~g')
          echo "name=$SAFE" >> "$GITHUB_OUTPUT"

      # Wordlist SecLists TIDAK di-commit ke repo (ukurannya besar).
      # Diambil file spesifiknya saja dari raw.githubusercontent.com,
      # dan di-cache supaya run berikutnya tidak download ulang.
      #
      # PENTING: cache key pakai suffix versi (-v2). Kalau path/isi berubah
      # dan hasil sebelumnya sempat ke-cache secara salah (mis. karena 404),
      # naikkan suffix ini (v2 -> v3, dst) supaya GitHub Actions tidak
      # memakai cache lama yang isinya rusak/kosong.
      - name: Cache SecLists wordlist
        id: cache-wordlist
        uses: actions/cache@v4
        with:
          path: wordlists/seclist-cache.txt
          key: seclist-${{ vars.SECLIST_PATH || 'Discovery/Web-Content/raft-medium-directories.txt' }}-v2

      - name: Download SecLists wordlist (jika belum ada di cache)
        if: steps.cache-wordlist.outputs.cache-hit != 'true'
        env:
          SECLIST_PATH: ${{ vars.SECLIST_PATH || 'Discovery/Web-Content/raft-medium-directories.txt' }}
        run: |
          mkdir -p wordlists
          URL="https://raw.githubusercontent.com/danielmiessler/SecLists/master/${SECLIST_PATH}"
          echo "Downloading: $URL"

          HTTP_CODE=$(curl -sSL -o wordlists/seclist-cache.txt -w "%{http_code}" "$URL")
          FILE_SIZE=$(wc -c < wordlists/seclist-cache.txt 2>/dev/null || echo 0)

          # Validasi: harus HTTP 200 DAN ukuran file wajar (>1000 bytes).
          # Ini mencegah file 404 page atau file kosong ikut ke-cache sebagai "sukses".
          if [ "$HTTP_CODE" != "200" ] || [ "$FILE_SIZE" -lt 1000 ]; then
            echo "::warning::Download gagal atau file tidak valid (HTTP $HTTP_CODE, size $FILE_SIZE bytes). Path SECLIST_PATH mungkin salah/tidak ada di SecLists. Fallback ke wordlists/common.txt"
            cp wordlists/common.txt wordlists/seclist-cache.txt
          else
            echo "Download berhasil: $FILE_SIZE bytes"
          fi

      - name: Run ffuf scan
        env:
          AUTH_TOKEN: ${{ secrets.TARGET_AUTH_TOKEN }}
        run: |
          mkdir -p results
          ffuf -u "${{ matrix.target }}/FUZZ" \
               -w wordlists/seclist-cache.txt \
               -H "User-Agent: Mozilla/5.0" \
               -mc 200 \
               -fs 404,403 \
               -o "results/${{ steps.safe-name.outputs.name }}.json" \
               -of json \
               -rate 20 \
               -t 10 \
               -timeout 10 \
               -maxtime 600 || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ffuf-results-${{ steps.safe-name.outputs.name }}
          path: results/*.json
          if-no-files-found: warn

  report:
    needs: fuzz
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-results

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Parse & generate report
        run: python scripts/parse_results.py

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/notify.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffuf-report
          path: report.md
